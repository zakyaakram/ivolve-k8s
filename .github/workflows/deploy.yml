name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout code
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Node.js
    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: 18

    # 3. Install dependencies
    - name: Install dependencies
      run: npm install

    # 4. Run tests
    - name: Run tests
      run: npm test

    # 5. Build Docker image
    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/node-app:latest .

    # 6. Login to DockerHub
    - name: Login DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # 7. Push image
    - name: Push image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/node-app:latest

    # 8. Remove local image
    - name: Remove local image
      run: docker rmi ${{ secrets.DOCKER_USERNAME }}/node-app:latest

    # 9. Setup kubectl
    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    # 🔐 10. Create kubeconfig from secrets (UPDATED)
    - name: Configure Kubernetes access
      run: |
        mkdir -p $HOME/.kube
        cat <<EOF > $HOME/.kube/config
        apiVersion: v1
        kind: Config
        clusters:
        - name: cluster
          cluster:
            certificate-authority-data: ${{ secrets.KUBE_CA }}
            server: ${{ secrets.KUBE_SERVER }}
        contexts:
        - name: context
          context:
            cluster: cluster
            user: user
        current-context: context
        users:
        - name: user
          user:
            token: ${{ secrets.KUBE_TOKEN }}
        EOF

    # 11. Deploy (safe for Minikube)
    - name: Deploy to Kubernetes
      run: |
        kubectl apply -f k8s/ || echo "Cluster unreachable (expected if using Minikube)"

    # 12. Verify
    - name: Check pods
      run: kubectl get pods -n ivolve || echo "Cannot connect to cluster"

    # 🔥 Post actions
    - name: Always
      if: always()
      run: echo "Pipeline finished"

    - name: On success
      if: success()
      run: echo "Success 🎉"

    - name: On failure
      if: failure()
      run: echo "Failed ❌"
